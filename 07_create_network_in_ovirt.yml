---
- name: Setup VLAN-tagged NAT network for oVirt VMs
  hosts: localhost
  gather_facts: false
  vars:
    ovirt_engine_url: "https://ovirt.internal.cloudapp.net/ovirt-engine/api"
    ovirt_engine_user: "admin@ovirt@internalsso"
    ovirt_engine_password: "ChangeMe123!"
    datacenter_name: "Default"
    cluster_name: "Default"
    host_name: "host1"
    nat_network_name: "nat-network"
    nat_vlan_id: 100
    nat_subnet: "192.168.100.0/24"
    nat_gateway: "192.168.100.1"
    dhcp_range_start: "192.168.100.10"
    dhcp_range_end: "192.168.100.200"
    
  tasks:
    - name: Authenticate to oVirt
      ovirt.ovirt.ovirt_auth:
        url: "{{ ovirt_engine_url }}"
        username: "{{ ovirt_engine_user }}"
        password: "{{ ovirt_engine_password }}"
        insecure: true
      register: ovirt_auth
      no_log: true

    - name: Create VLAN-tagged NAT network
      ovirt.ovirt.ovirt_network:
        auth: "{{ ovirt_auth.ansible_facts.ovirt_auth }}"
        data_center: "{{ datacenter_name }}"
        name: "{{ nat_network_name }}"
        description: "VLAN-tagged NAT network ({{ nat_subnet }}) - VLAN {{ nat_vlan_id }}"
        vlan_tag: "{{ nat_vlan_id }}"
        mtu: 1500
        state: present

    - name: Attach network to cluster
      ovirt.ovirt.ovirt_network:
        auth: "{{ ovirt_auth.ansible_facts.ovirt_auth }}"
        data_center: "{{ datacenter_name }}"
        name: "{{ nat_network_name }}"
        clusters:
          - name: "{{ cluster_name }}"
            assigned: true
            required: false
            display: false
            migration: false
        state: present

    - name: Attach VLAN-tagged NAT network to eth0
      ovirt.ovirt.ovirt_host_network:
        auth: "{{ ovirt_auth.ansible_facts.ovirt_auth }}"
        name: "{{ host_name }}"
        interface: eth0
        save: true
        check: false
        sync_networks: true
        networks:
          - name: "{{ nat_network_name }}"
            boot_protocol: none
      register: network_setup
      ignore_errors: true

    - name: Display network setup result
      ansible.builtin.debug:
        msg: "{{ 'Network attached successfully to eth0' if network_setup is succeeded else 'Network attachment may need manual verification in oVirt UI' }}"

    - name: Wait for network to sync
      ansible.builtin.pause:
        seconds: 10
      when: network_setup is succeeded

    - name: Display completion and next steps
      ansible.builtin.debug:
        msg:
          - "✓ VLAN-tagged NAT network '{{ nat_network_name }}' created"
          - "✓ VLAN ID: {{ nat_vlan_id }}"
          - "{{ '✓ Network attached to eth0' if network_setup is succeeded else '⚠ Attach network to eth0 manually in oVirt UI' }}"
          - ""
          - "oVirt will create:"
          - "  - VLAN interface: eth0.{{ nat_vlan_id }}"
          - "  - Bridge: {{ nat_network_name }}"
          - ""
          - "Next: Run the host configuration playbook to setup NAT/DHCP"
          - "Command: ansible-playbook -i inventory.ini configure-nat-host.yml --ask-become-pass"

    - name: Revoke authentication token
      ovirt.ovirt.ovirt_auth:
        state: absent
        ovirt_auth: "{{ ovirt_auth.ansible_facts.ovirt_auth }}"
