---
- name: Configure oVirt host for VLAN-tagged NAT networking with dnsmasq
  hosts: host1
  become: true
  gather_facts: true
  vars:
    nat_network_name: "nat-network"
    nat_vlan_id: 100
    nat_subnet: "192.168.100.0/24"
    nat_gateway: "192.168.100.1"
    nat_prefix: "24"
    dhcp_range_start: "192.168.100.10"
    dhcp_range_end: "192.168.100.200"
    dhcp_lease_time: "24h"
    dns_servers: "168.63.129.16,8.8.8.8"
    domain_name: "nat.local"

  tasks:
    # Install required packages
    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - dnsmasq
          - NetworkManager
          - bridge-utils
        state: present

    # Detect the bridge interface created by oVirt
    - name: Check if oVirt created a bridge with network name
      ansible.builtin.command:
        cmd: ip link show {{ nat_network_name }}
      register: bridge_check
      failed_when: false
      changed_when: false

    - name: Set NAT interface to bridge if it exists
      ansible.builtin.set_fact:
        nat_interface: "{{ nat_network_name }}"
      when: bridge_check.rc == 0

    - name: If bridge doesn't exist, look for VLAN interface
      ansible.builtin.command:
        cmd: ip link show eth0.{{ nat_vlan_id }}
      register: vlan_check
      failed_when: false
      changed_when: false
      when: bridge_check.rc != 0

    - name: Set NAT interface to VLAN if bridge doesn't exist
      ansible.builtin.set_fact:
        nat_interface: "eth0.{{ nat_vlan_id }}"
      when: 
        - bridge_check.rc != 0
        - vlan_check.rc == 0

    - name: Fail if no suitable interface found
      ansible.builtin.fail:
        msg: "Could not find bridge '{{ nat_network_name }}' or VLAN interface 'eth0.{{ nat_vlan_id }}'. Please verify network is attached in oVirt."
      when: nat_interface is not defined

    - name: Display detected NAT interface
      ansible.builtin.debug:
        msg: "Detected NAT interface: {{ nat_interface }}"

    # Configure IP on the NAT interface (bridge or VLAN)
    - name: Check if interface already has IP configured
      ansible.builtin.shell:
        cmd: ip addr show {{ nat_interface }} | grep "{{ nat_gateway }}"
      register: ip_check
      failed_when: false
      changed_when: false

    - name: Configure IP on NAT interface
      ansible.builtin.command:
        cmd: ip addr add {{ nat_gateway }}/{{ nat_prefix }} dev {{ nat_interface }}
      when: ip_check.rc != 0

    - name: Bring up NAT interface
      ansible.builtin.command:
        cmd: ip link set {{ nat_interface }} up
      changed_when: false

    - name: Make IP configuration persistent
      ansible.builtin.copy:
        dest: /etc/sysconfig/network-scripts/ifcfg-{{ nat_interface }}
        content: |
          DEVICE={{ nat_interface }}
          BOOTPROTO=static
          IPADDR={{ nat_gateway }}
          PREFIX={{ nat_prefix }}
          ONBOOT=yes
          TYPE=Bridge
        mode: '0644'
      when: nat_interface == nat_network_name

    # Enable IP forwarding
    - name: Enable IP forwarding (runtime)
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        sysctl_set: true
        reload: true

    - name: Enable IP forwarding (persistent)
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        sysctl_file: /etc/sysctl.conf
        reload: true

    # Configure firewalld for NAT
    - name: Enable masquerading on public zone
      ansible.posix.firewalld:
        masquerade: true
        state: enabled
        permanent: true
        zone: public
        immediate: true

    - name: Add NAT interface to trusted zone
      ansible.posix.firewalld:
        interface: "{{ nat_interface }}"
        zone: trusted
        state: enabled
        permanent: true
        immediate: true

    - name: Allow DHCP service on trusted zone
      ansible.posix.firewalld:
        service: dhcp
        zone: trusted
        state: enabled
        permanent: true
        immediate: true

    - name: Allow DNS service on trusted zone
      ansible.posix.firewalld:
        service: dns
        zone: trusted
        state: enabled
        permanent: true
        immediate: true

    # Configure dnsmasq
    - name: Create dnsmasq configuration directory
      ansible.builtin.file:
        path: /etc/dnsmasq.d
        state: directory
        mode: '0755'

    - name: Configure dnsmasq for NAT network
      ansible.builtin.copy:
        dest: /etc/dnsmasq.d/nat-network.conf
        content: |
          # Listen only on the NAT bridge/interface created by oVirt
          interface={{ nat_interface }}
          bind-interfaces

          # Don't read /etc/resolv.conf or /etc/hosts
          no-resolv
          no-hosts

          # DHCP range
          dhcp-range={{ dhcp_range_start }},{{ dhcp_range_end }},{{ dhcp_lease_time }}

          # Gateway (the host itself)
          dhcp-option=3,{{ nat_gateway }}

          # DNS servers (Azure DNS, then Google)
          dhcp-option=6,{{ dns_servers }}

          # Domain
          domain={{ domain_name }}
          local=/{{ domain_name }}/

          # Upstream DNS servers
          server=168.63.129.16
          server=8.8.8.8

          # Enable DHCP logging
          log-dhcp

          # DHCP authoritative
          dhcp-authoritative
        mode: '0644'
      notify: Restart dnsmasq

    - name: Ensure main dnsmasq.conf includes conf-dir
      ansible.builtin.lineinfile:
        path: /etc/dnsmasq.conf
        regexp: '^conf-dir='
        line: 'conf-dir=/etc/dnsmasq.d/,*.conf'
        state: present
      notify: Restart dnsmasq

    - name: Enable and start dnsmasq service
      ansible.builtin.systemd:
        name: dnsmasq
        enabled: true
        state: started

    # Verification tasks
    - name: Verify IP forwarding is enabled
      ansible.builtin.command:
        cmd: sysctl net.ipv4.ip_forward
      register: ip_forward_check
      changed_when: false

    - name: Verify NAT interface is up and has IP
      ansible.builtin.command:
        cmd: ip addr show {{ nat_interface }}
      register: interface_check
      changed_when: false

    - name: Check dnsmasq status
      ansible.builtin.systemd:
        name: dnsmasq
      register: dnsmasq_status

    - name: Get recent dnsmasq logs
      ansible.builtin.command:
        cmd: journalctl -u dnsmasq -n 20 --no-pager
      register: dnsmasq_logs
      changed_when: false

    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "✓ NAT network configuration completed successfully"
          - ""
          - "Network Interface: {{ nat_interface }}"
          - "Gateway IP: {{ nat_gateway }}/{{ nat_prefix }}"
          - "DHCP Range: {{ dhcp_range_start }} - {{ dhcp_range_end }}"
          - "DNS Servers: {{ dns_servers }}"
          - "Domain: {{ domain_name }}"
          - "IP Forwarding: {{ ip_forward_check.stdout }}"
          - "dnsmasq Status: {{ dnsmasq_status.status.ActiveState }}"
          - ""
          - "Next steps:"
          - "1. Create a test VM in oVirt"
          - "2. Attach it to '{{ nat_network_name }}' network"
          - "3. Start the VM"
          - "4. Monitor DHCP: sudo journalctl -u dnsmasq -f"
          - "5. Check leases: cat /var/lib/dnsmasq/dnsmasq.leases"

    - name: Display recent dnsmasq logs
      ansible.builtin.debug:
        msg: "{{ dnsmasq_logs.stdout_lines }}"

  handlers:
    - name: Restart dnsmasq
      ansible.builtin.systemd:
        name: dnsmasq
        state: restarted
